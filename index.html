<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Knowledge Graph</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .graph-layout {
      display: flex;
      height: calc(100vh - 56px);
    }

    /* Toolbar */
    .graph-toolbar {
      position: absolute;
      top: 72px;
      left: 16px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .graph-controls {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    /* Graph canvas */
    #graph-container {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: var(--bg);
    }

    #graph-svg {
      width: 100%;
      height: 100%;
      cursor: grab;
    }

    #graph-svg:active { cursor: grabbing; }

    /* Side panel */
    .graph-side {
      width: 320px;
      flex-shrink: 0;
      border-left: 1px solid var(--border);
      background: var(--bg2);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .side-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }

    .side-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    /* Node detail */
    .node-detail { display: none; }
    .node-detail.active { display: block; }

    .node-name {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .node-desc {
      color: var(--text2);
      font-size: 13px;
      margin: 12px 0;
      line-height: 1.7;
    }

    .node-stat {
      display: flex;
      gap: 16px;
      margin: 12px 0;
      padding: 12px;
      background: var(--bg3);
      border-radius: var(--radius);
    }

    .section-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin: 16px 0 8px;
    }

    .relation-list { display: flex; flex-direction: column; gap: 4px; }

    .relation-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: var(--transition);
    }

    .relation-item:hover { background: var(--bg3); }

    .relation-label {
      font-size: 11px;
      color: var(--text3);
      background: var(--bg3);
      padding: 2px 6px;
      border-radius: 4px;
      white-space: nowrap;
    }

    .relation-name { font-size: 13px; color: var(--text2); }
    .relation-name:hover { color: var(--text); }

    .source-list { display: flex; flex-direction: column; gap: 4px; }

    .source-item {
      font-size: 12px;
      color: var(--text2);
      padding: 4px 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
    }

    .source-item:last-child { border-bottom: none; }
    .source-item:hover { color: var(--accent); }

    /* Empty side */
    .side-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text3);
      text-align: center;
      padding: 24px;
    }

    .side-empty-icon { font-size: 36px; margin-bottom: 12px; opacity: .4; }

    /* Zoom controls */
    .zoom-controls {
      position: absolute;
      bottom: 24px;
      right: 340px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      z-index: 10;
    }

    .zoom-btn {
      width: 32px; height: 32px;
      background: var(--bg2);
      border: 1px solid var(--border);
      color: var(--text2);
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      transition: var(--transition);
    }

    .zoom-btn:hover { background: var(--bg3); color: var(--text); }

    /* Legend */
    .legend {
      position: absolute;
      bottom: 24px;
      left: 16px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
      z-index: 10;
    }

    .legend-title {
      font-size: 11px;
      color: var(--text3);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .legend-items { display: flex; flex-direction: column; gap: 6px; }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--text2);
      cursor: pointer;
    }

    .legend-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* Node SVG styles (injected by JS) */
    .node circle { stroke-width: 1.5; transition: r 0.2s; }
    .node text {
      pointer-events: none;
      font-size: 10px;
      fill: var(--text2);
      text-anchor: middle;
    }
    .node.highlighted circle { stroke-width: 3 !important; }
    .node.faded { opacity: 0.15; }

    .link {
      stroke: var(--border);
      stroke-width: 1;
      stroke-opacity: 0.6;
    }
    .link.highlighted { stroke: var(--accent); stroke-opacity: 1; stroke-width: 1.5; }
    .link.faded { stroke-opacity: 0.05; }
  </style>
</head>
<body>

<nav class="nav">
  <div class="nav-brand">🔮 <span>AI</span> Knowledge Graph</div>
  <div class="nav-links">
    <a href="index.html" class="active">知识图谱</a>
    <a href="ranking.html">排行榜</a>
    <a href="browse.html">分类浏览</a>
  </div>
  <div class="nav-meta" id="nav-meta">加载中…</div>
</nav>

<div class="page">
  <div class="graph-layout">
    <div id="graph-container">

      <!-- Toolbar -->
      <div class="graph-toolbar">
        <div class="graph-controls">
          <div class="search-box">
            <span class="search-icon">🔍</span>
            <input type="text" id="search-input" placeholder="搜索节点…">
          </div>
        </div>
        <div class="filter-bar" id="type-filters">
          <button class="chip active" data-type="all">全部</button>
          <button class="chip chip-company" data-type="company">公司/院校</button>
          <button class="chip chip-product" data-type="product">产品</button>
          <button class="chip chip-person" data-type="person">人物</button>
          <button class="chip chip-tech" data-type="tech">技术概念</button>
          <button class="chip chip-paper" data-type="paper">论文</button>
        </div>
      </div>

      <!-- SVG -->
      <svg id="graph-svg"></svg>

      <!-- Zoom controls -->
      <div class="zoom-controls">
        <button class="zoom-btn" id="zoom-in">+</button>
        <button class="zoom-btn" id="zoom-reset">⊙</button>
        <button class="zoom-btn" id="zoom-out">−</button>
      </div>

      <!-- Legend -->
      <div class="legend">
        <div class="legend-title">节点类型</div>
        <div class="legend-items">
          <div class="legend-item" data-type="company"><div class="legend-dot" style="background:var(--color-company)"></div>公司/院校</div>
          <div class="legend-item" data-type="product"><div class="legend-dot" style="background:var(--color-product)"></div>产品</div>
          <div class="legend-item" data-type="person"><div class="legend-dot" style="background:var(--color-person)"></div>人物</div>
          <div class="legend-item" data-type="tech"><div class="legend-dot" style="background:var(--color-tech)"></div>技术概念</div>
          <div class="legend-item" data-type="paper"><div class="legend-dot" style="background:var(--color-paper)"></div>论文</div>
        </div>
      </div>

    </div><!-- /graph-container -->

    <!-- Side panel -->
    <div class="graph-side">
      <div class="side-header">
        <div class="stats-bar" id="stats-bar">
          <div class="stat"><div class="stat-value" id="stat-nodes">…</div><div class="stat-label">节点</div></div>
          <div class="stat"><div class="stat-value" id="stat-edges">…</div><div class="stat-label">关系</div></div>
          <div class="stat"><div class="stat-value" id="stat-docs">…</div><div class="stat-label">文档</div></div>
        </div>
      </div>
      <div class="side-body" id="side-body">
        <div class="side-empty">
          <div class="side-empty-icon">🔮</div>
          <div>点击节点查看详情</div>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- Tooltip -->
<div class="tooltip" id="tooltip" style="display:none"></div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="js/graph.js"></script>
</body>
</html>
