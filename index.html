<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Knowledge Graph</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ---- Layout ---- */
    .graph-layout {
      display: flex;
      height: calc(100vh - 56px - 28px); /* nav + footer */
    }

    /* ---- Loading overlay ---- */
    #loading-overlay {
      position: fixed;
      inset: 0;
      background: rgba(13,17,23,0.92);
      z-index: 999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      color: var(--text2);
      font-size: 14px;
    }
    .loading-spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ---- Graph canvas ---- */
    #graph-container {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: var(--bg);
    }
    #graph-svg { width: 100%; height: 100%; cursor: grab; }
    #graph-svg:active { cursor: grabbing; }

    /* ---- Toolbar ---- */
    .graph-toolbar {
      position: absolute;
      top: 72px;
      left: 16px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .graph-controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

    /* search hint */
    #search-hint {
      font-size: 11px;
      color: var(--text3);
      padding: 2px 4px;
      min-height: 16px;
    }

    /* ---- Node count badge ---- */
    #visible-count-badge {
      font-size: 11px;
      color: var(--text3);
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 2px 8px;
      white-space: nowrap;
    }

    /* ---- Left: node detail ---- */
    .graph-side {
      width: 280px;
      flex-shrink: 0;
      border-left: 1px solid var(--border);
      background: var(--bg2);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .side-header { padding: 12px 16px; border-bottom: 1px solid var(--border); }
    .side-body { flex: 1; overflow-y: auto; padding: 16px; }

    /* ---- Right panel: filter + ranking ---- */
    .graph-right {
      width: 230px;
      flex-shrink: 0;
      border-left: 1px solid var(--border);
      background: var(--bg2);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .right-header {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      font-weight: 600;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Type filter panel */
    .type-filter-section {
      padding: 10px 14px 6px;
      border-bottom: 1px solid var(--border);
    }
    .type-filter-title {
      font-size: 10px;
      color: var(--text3);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    #type-filter-panel { display: flex; flex-direction: column; gap: 3px; }
    .type-check-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text2);
      cursor: pointer;
      padding: 3px 4px;
      border-radius: 5px;
      transition: background 0.12s;
    }
    .type-check-item:hover { background: var(--bg3); }
    .type-check-item input[type=checkbox] { accent-color: var(--accent); cursor: pointer; }
    .type-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .type-name { flex: 1; }
    .type-cnt { font-size: 10px; color: var(--text3); }

    /* Ranking */
    #right-ranking { flex: 1; overflow-y: auto; padding: 8px 12px; }
    .rr-item {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 4px; border-radius: 6px; cursor: pointer;
      transition: background 0.15s; font-size: 12px;
    }
    .rr-item:hover { background: var(--bg3); }
    .rr-rank { width: 18px; text-align: right; font-size: 11px; color: var(--text3); flex-shrink: 0; }
    .rr-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text); }
    .rr-bar-wrap { width: 36px; height: 4px; background: var(--bg3); border-radius: 2px; overflow: hidden; flex-shrink: 0; }
    .rr-bar { height: 100%; border-radius: 2px; }
    .rr-count { width: 24px; text-align: right; color: var(--text3); font-size: 11px; flex-shrink: 0; }

    /* ---- Node detail ---- */
    .node-detail { display: none; }
    .node-detail.active { display: block; }
    .node-name { font-size: 17px; font-weight: 700; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .node-desc { color: var(--text2); font-size: 13px; margin: 12px 0; line-height: 1.7; }
    .node-stat { display: flex; gap: 12px; margin: 12px 0; padding: 12px; background: var(--bg3); border-radius: var(--radius); }
    .section-title { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin: 16px 0 8px; }
    .relation-list { display: flex; flex-direction: column; gap: 4px; }
    .relation-item { display: flex; align-items: center; gap: 6px; padding: 5px 6px; border-radius: var(--radius); cursor: pointer; transition: var(--transition); }
    .relation-item:hover { background: var(--bg3); }
    .relation-label { font-size: 10px; padding: 2px 6px; border-radius: 4px; border: 1px solid; white-space: nowrap; flex-shrink: 0; }
    .relation-name { font-size: 12px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .relation-count { font-size: 10px; color: var(--text3); flex-shrink: 0; }
    .source-more { font-size: 11px; color: var(--text3); padding: 4px 0; }
    .goto-ranking { margin-top: 16px; display: block; text-align: center; font-size: 12px; color: var(--accent); cursor: pointer; padding: 6px; border: 1px solid var(--border); border-radius: var(--radius); transition: var(--transition); }
    .goto-ranking:hover { background: var(--bg3); }

    /* ---- Empty side ---- */
    .side-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text3); text-align: center; padding: 24px; }
    .side-empty-icon { font-size: 36px; margin-bottom: 12px; opacity: .4; }

    /* ---- Zoom controls ---- */
    .zoom-controls {
      position: absolute;
      bottom: 36px;
      right: 244px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      z-index: 10;
    }
    .zoom-btn { width: 32px; height: 32px; background: var(--bg2); border: 1px solid var(--border); color: var(--text2); border-radius: var(--radius); cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: var(--transition); }
    .zoom-btn:hover { background: var(--bg3); color: var(--text); }
    .zoom-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .zoom-btn.warn-active { background: #e3b341; color: #000; border-color: #e3b341; }

    /* ---- Legend (persistent) ---- */
    .legend {
      position: absolute;
      bottom: 36px;
      left: 16px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      z-index: 10;
      max-width: 175px;
    }
    .legend-title { font-size: 10px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .legend-items { display: flex; flex-direction: column; gap: 5px; }
    .legend-item { display: flex; align-items: center; gap: 7px; font-size: 11px; color: var(--text2); cursor: pointer; }
    .legend-item:hover { color: var(--text); }
    .legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .legend-relations { margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 4px; }
    .legend-rel-item { display: flex; align-items: center; gap: 6px; font-size: 10px; color: var(--text3); }
    .legend-rel-dot { width: 20px; height: 2px; border-radius: 1px; flex-shrink: 0; }

    /* ---- Footer ---- */
    .graph-footer {
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg2);
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--text3);
    }

    /* ---- SVG node styles ---- */
    .node circle { stroke-width: 1.5; }
    .node text { pointer-events: none; font-size: 10px; fill: var(--text2); text-anchor: middle; }
    .node.highlighted circle { stroke-width: 3 !important; filter: brightness(1.3); }
    .node.faded { opacity: 0.10; }
    .link.highlighted { stroke-opacity: 1 !important; stroke-width: 2 !important; }
    .link.faded { stroke-opacity: 0.04 !important; }
  </style>
</head>
<body>

<!-- Loading overlay -->
<div id="loading-overlay">
  <div class="loading-spinner"></div>
  <div class="loading-msg">正在加载知识图谱数据…</div>
</div>

<nav class="nav">
  <div class="nav-brand">🔮 <span>AI</span> Knowledge Graph</div>
  <div class="nav-links">
    <a href="index.html" class="active">知识图谱</a>
    <a href="ranking.html">排行榜</a>
    <a href="browse.html">分类浏览</a>
  </div>
  <div class="nav-meta" id="nav-meta">加载中…</div>
</nav>

<div class="page">
  <div class="graph-layout">

    <!-- Graph canvas -->
    <div id="graph-container">

      <!-- Toolbar -->
      <div class="graph-toolbar">
        <div class="graph-controls">
          <div class="search-box">
            <span class="search-icon">🔍</span>
            <input type="text" id="search-input" placeholder="搜索节点… (Esc清除)">
          </div>
          <span id="visible-count-badge">…</span>
        </div>
        <div id="search-hint"></div>
        <div class="filter-bar" id="type-filters">
          <button class="chip active" data-type="all">全部</button>
          <button class="chip chip-company" data-type="company">公司/院校</button>
          <button class="chip chip-product" data-type="product">产品</button>
          <button class="chip chip-person" data-type="person">人物</button>
          <button class="chip chip-tech" data-type="tech">技术概念</button>
          <button class="chip chip-paper" data-type="paper">论文</button>
        </div>
      </div>

      <!-- SVG -->
      <svg id="graph-svg"></svg>

      <!-- Zoom + controls -->
      <div class="zoom-controls">
        <button class="zoom-btn" id="zoom-in" title="放大">+</button>
        <button class="zoom-btn" id="zoom-reset" title="重置视图">⊙</button>
        <button class="zoom-btn" id="zoom-out" title="缩小">−</button>
        <button class="zoom-btn" id="toggle-isolated" title="显示孤立节点" style="font-size:12px;margin-top:4px">⭕</button>
        <button class="zoom-btn" id="toggle-show-all" title="显示全部节点" style="font-size:11px;margin-top:2px">全</button>
      </div>

      <!-- Legend (persistent) -->
      <div class="legend">
        <div class="legend-title">节点类型</div>
        <div class="legend-items">
          <div class="legend-item" data-type="company"><div class="legend-dot" style="background:var(--color-company)"></div>公司/院校</div>
          <div class="legend-item" data-type="product"><div class="legend-dot" style="background:var(--color-product)"></div>产品</div>
          <div class="legend-item" data-type="person"><div class="legend-dot" style="background:var(--color-person)"></div>人物</div>
          <div class="legend-item" data-type="tech"><div class="legend-dot" style="background:var(--color-tech)"></div>技术概念</div>
          <div class="legend-item" data-type="paper"><div class="legend-dot" style="background:var(--color-paper)"></div>论文</div>
        </div>
        <div class="legend-relations" id="legend-relations"></div>
      </div>

    </div><!-- /graph-container -->

    <!-- Left: node detail -->
    <div class="graph-side">
      <div class="side-header">
        <div class="stats-bar" id="stats-bar">
          <div class="stat"><div class="stat-value" id="stat-nodes">…</div><div class="stat-label">节点</div></div>
          <div class="stat"><div class="stat-value" id="stat-edges">…</div><div class="stat-label">关系</div></div>
          <div class="stat"><div class="stat-value" id="stat-docs">…</div><div class="stat-label">文档</div></div>
        </div>
      </div>
      <div class="side-body" id="side-body">
        <div class="side-empty">
          <div class="side-empty-icon">🔮</div>
          <div>点击节点查看详情</div>
        </div>
      </div>
    </div>

    <!-- Right: type filter + ranking -->
    <div class="graph-right">
      <div class="right-header">🎛 筛选 & 排行</div>
      <div class="type-filter-section">
        <div class="type-filter-title">节点类型</div>
        <div id="type-filter-panel"></div>
      </div>
      <div class="right-header" style="border-top:1px solid var(--border)">🏆 热度排行</div>
      <div id="right-ranking">
        <div style="padding:16px;color:var(--text3);font-size:12px">加载中…</div>
      </div>

      <!-- 数据看板 -->
      <div class="right-header" style="border-top:1px solid var(--border)">📊 数据看板</div>
      <div class="dash-section">
        <div class="dash-sub">话题分布 TOP8</div>
        <div class="dash-bars" id="dash-bars">
          <div class="dbar-row"><span class="dbar-label" title="大语言模型">大语言模型</span><div class="dbar-track"><div class="dbar-fill" style="width:100%"></div></div><span class="dbar-n">79</span></div>
          <div class="dbar-row"><span class="dbar-label" title="强化学习">强化学习</span><div class="dbar-track"><div class="dbar-fill" style="width:53%"></div></div><span class="dbar-n">42</span></div>
          <div class="dbar-row"><span class="dbar-label" title="AI Agent">AI Agent</span><div class="dbar-track"><div class="dbar-fill" style="width:49%"></div></div><span class="dbar-n">39</span></div>
          <div class="dbar-row"><span class="dbar-label" title="大模型">大模型</span><div class="dbar-track"><div class="dbar-fill" style="width:38%"></div></div><span class="dbar-n">30</span></div>
          <div class="dbar-row"><span class="dbar-label" title="多模态">多模态</span><div class="dbar-track"><div class="dbar-fill" style="width:30%"></div></div><span class="dbar-n">24</span></div>
          <div class="dbar-row"><span class="dbar-label" title="视频生成">视频生成</span><div class="dbar-track"><div class="dbar-fill" style="width:25%"></div></div><span class="dbar-n">20</span></div>
          <div class="dbar-row"><span class="dbar-label" title="开源模型">开源模型</span><div class="dbar-track"><div class="dbar-fill" style="width:25%"></div></div><span class="dbar-n">20</span></div>
          <div class="dbar-row"><span class="dbar-label" title="多模态AI">多模态AI</span><div class="dbar-track"><div class="dbar-fill" style="width:20%"></div></div><span class="dbar-n">16</span></div>
        </div>
        <div class="dash-sub" style="margin-top:10px">热门机构 TOP8</div>
        <div class="dash-entities">
          <span class="dent top">OpenAI</span><span class="dent top">Anthropic</span><span class="dent top">字节跳动</span>
          <span class="dent">Meta</span><span class="dent">DeepSeek</span><span class="dent">Google</span>
          <span class="dent">英伟达</span><span class="dent">微软</span>
        </div>
      </div>
    </div>

  </div><!-- /graph-layout -->
</div><!-- /page -->

<!-- Footer -->
<div class="graph-footer">
  <a href="https://ai-query-hub-space.mynocode.host" target="_blank" rel="noopener noreferrer"
    style="display:inline-flex;align-items:center;gap:6px;padding:8px 20px;background:linear-gradient(135deg,#1f6feb,#388bfd);color:#fff;border-radius:20px;font-weight:700;font-size:13px;text-decoration:none;box-shadow:0 3px 12px rgba(56,139,253,0.4);">

</div>
