<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>分类浏览 · AI Knowledge Graph</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .browse-layout {
      display: flex;
      height: calc(100vh - 56px);
    }

    /* Sidebar */
    .browse-sidebar {
      width: 260px;
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      background: var(--bg2);
      overflow-y: auto;
    }

    .sidebar-header {
      padding: 20px 16px 12px;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      font-weight: 600;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .category-list { padding: 8px; }

    .category-item {
      padding: 10px 12px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .category-item:hover { background: var(--bg3); }
    .category-item.active { background: var(--bg3); border: 1px solid var(--border); }

    .category-name {
      font-size: 13px;
      color: var(--text2);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .category-item.active .category-name { color: var(--text); }

    .category-count {
      font-size: 11px;
      color: var(--text3);
      background: var(--bg);
      padding: 2px 6px;
      border-radius: 10px;
    }

    /* Main content */
    .browse-main {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }

    .browse-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .browse-desc {
      color: var(--text2);
      font-size: 13px;
      margin-bottom: 24px;
    }

    /* Mini stats */
    .mini-stats {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
    }

    .mini-stat {
      padding: 12px 20px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      text-align: center;
      flex: 1;
    }

    .mini-stat-val { font-size: 24px; font-weight: 700; color: var(--accent); }
    .mini-stat-lab { font-size: 11px; color: var(--text2); margin-top: 2px; }

    /* Two-column layout */
    .browse-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

    .col-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }

    /* Doc list */
    .doc-list { display: flex; flex-direction: column; gap: 6px; }

    .doc-item {
      padding: 10px 12px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 12px;
      color: var(--text2);
      cursor: pointer;
      transition: var(--transition);
      line-height: 1.5;
    }

    .doc-item:hover { border-color: var(--accent); color: var(--text); }

    /* Top nodes list */
    .top-node-list { display: flex; flex-direction: column; gap: 6px; }

    .top-node-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      transition: var(--transition);
    }

    .top-node-item:hover { border-color: var(--accent); }

    .top-node-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .top-node-name { font-size: 13px; flex: 1; }

    .top-node-count {
      font-size: 11px;
      color: var(--text3);
    }

    @media (max-width: 700px) {
      .browse-cols { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<nav class="nav">
  <div class="nav-brand">🔮 <span>AI</span> Knowledge Graph</div>
  <div class="nav-links">
    <a href="index.html">知识图谱</a>
    <a href="ranking.html">排行榜</a>
    <a href="browse.html" class="active">分类浏览</a>
  </div>
  <div class="nav-meta" id="nav-meta">加载中…</div>
</nav>

<div class="page">
  <div class="browse-layout">

    <div class="browse-sidebar">
      <div class="sidebar-header">文档分类</div>
      <div class="category-list" id="category-list">
        <div class="loading" style="height:120px">
          <div class="spinner"></div>
        </div>
      </div>
    </div>

    <div class="browse-main" id="browse-main">
      <div class="loading" style="height:100%">
        <div class="spinner"></div>
        <div>加载中…</div>
      </div>
    </div>

  </div>
</div>

<script src="js/browse.js"></script>
</body>
</html>
